<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgery Game</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        #gameArea { border: 1px solid #000; margin: auto; display: block; }
        #menu, #hud, #results { display: none; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>Surgery Game</h1>
        <button id="startGame">Start Game</button>
    </div>
    <canvas id="gameArea" width="800" height="600"></canvas>
    <div id="hud">
        <p>Time: <span id="timer">60</span>s</p>
        <p>Score: <span id="score">0</span></p>
    </div>
    <div id="results">
        <h2>Results</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <button id="restartGame">Restart</button>
    </div>

    <script>
        let timer;
        let score = 0;
        document.getElementById('startGame').onclick = function() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            startGame();
        };

        function startGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            startTimer(60);
            // Game logic goes here
        }

        function startTimer(duration) {
            let timeRemaining = duration;
            document.getElementById('timer').innerText = timeRemaining;
            timer = setInterval(function() {
                timeRemaining--;
                document.getElementById('timer').innerText = timeRemaining;
                if (timeRemaining <= 0) {
                    clearInterval(timer);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            document.getElementById('hud').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
        }

        document.getElementById('restartGame').onclick = function() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
        };
    </script>
</body>
</html>
